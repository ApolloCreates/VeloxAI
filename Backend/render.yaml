services:
  - type: web
    name: veloxai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app

  - type: worker
    name: veloxai-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.worker worker --pool=solo --loglevel=info